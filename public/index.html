<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Zoom Meeting Manager</title>
        <meta
            name="description"
            content="Manage your Zoom meetings with this Node.js Clean Architecture application."
        />
        <link rel="stylesheet" href="style.css" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body>
        <div class="container">
            <header class="header">
                <h1>Zoom Meeting Manager</h1>
            </header>

            <main class="main-content">
                <section class="card form-section">
                    <h2>Create New Meeting</h2>
                    <form id="createMeetingForm" novalidate>
                        <div class="form-group">
                            <label for="topic">Topic <span class="required">*</span></label>
                            <input
                                type="text"
                                id="topic"
                                name="topic"
                                required
                                placeholder="e.g. Weekly Sync"
                                maxlength="200"
                            />
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="startDate"
                                    >Start Date <span class="required">*</span></label
                                >
                                <input type="date" id="startDate" name="startDate" required />
                            </div>
                            <div class="form-group">
                                <label for="startTimeInput"
                                    >Start Time <span class="required">*</span></label
                                >
                                <input
                                    type="time"
                                    id="startTimeInput"
                                    name="startTimeInput"
                                    required
                                    step="300"
                                />
                            </div>
                        </div>

                        <div class="form-row">
                            <div class="form-group">
                                <label for="durationMinutes"
                                    >Duration (mins) <span class="required">*</span></label
                                >
                                <input
                                    type="number"
                                    id="durationMinutes"
                                    name="durationMinutes"
                                    value="30"
                                    min="15"
                                    max="1440"
                                    required
                                />
                            </div>
                            <div class="form-group">
                                <label for="timezone">Timezone</label>
                                <input
                                    type="text"
                                    id="timezone"
                                    name="timezone"
                                    value="UTC"
                                    placeholder="e.g. Europe/Amman"
                                />
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="meetingType">Meeting Type</label>
                            <select id="meetingType" name="meetingType">
                                <option value="2" selected>Scheduled</option>
                                <option value="1">Instant</option>
                                <option value="3">Recurring (no fixed time)</option>
                                <option value="8">Recurring (fixed time)</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="password"
                                >Password <span class="hint">(optional, max 10 chars)</span></label
                            >
                            <input
                                type="text"
                                id="password"
                                name="password"
                                maxlength="10"
                                placeholder="Leave blank for no password"
                            />
                        </div>

                        <div class="form-group">
                            <label for="agenda">Agenda <span class="hint">(optional)</span></label>
                            <textarea
                                id="agenda"
                                name="agenda"
                                rows="2"
                                placeholder="Meeting agenda items..."
                                maxlength="2000"
                            ></textarea>
                        </div>

                        <div class="settings-section">
                            <p class="settings-title">Meeting Settings</p>
                            <div class="settings-grid">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="waitingRoom" name="waitingRoom" />
                                    <span>Waiting Room</span>
                                </label>
                                <label class="checkbox-label">
                                    <input
                                        type="checkbox"
                                        id="muteUponEntry"
                                        name="muteUponEntry"
                                    />
                                    <span>Mute on Entry</span>
                                </label>
                                <label class="checkbox-label">
                                    <input
                                        type="checkbox"
                                        id="joinBeforeHost"
                                        name="joinBeforeHost"
                                    />
                                    <span>Join Before Host</span>
                                </label>
                            </div>
                            <div class="form-group" style="margin-top: 0.75rem">
                                <label for="autoRecording">Auto-Recording</label>
                                <select id="autoRecording" name="autoRecording">
                                    <option value="none" selected>None</option>
                                    <option value="local">Local</option>
                                    <option value="cloud">Cloud</option>
                                </select>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary" id="submitBtn">
                            Create Meeting
                        </button>
                        <div id="formMessage" class="message hidden"></div>
                    </form>
                </section>

                <section class="card list-section">
                    <div class="list-header">
                        <h2>Upcoming Meetings</h2>
                        <button
                            class="btn btn-secondary"
                            id="refreshBtn"
                            onclick="app.loadMeetings()"
                        >
                            <svg
                                width="14"
                                height="14"
                                viewBox="0 0 24 24"
                                fill="none"
                                stroke="currentColor"
                                stroke-width="2.5"
                            >
                                <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-10.3l1.83 2.73" />
                            </svg>
                            Refresh
                        </button>
                    </div>
                    <div class="table-container">
                        <table class="meetings-table">
                            <thead>
                                <tr>
                                    <th>Topic</th>
                                    <th>Start Time</th>
                                    <th>Duration</th>
                                    <th>Status</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="meetingsTableBody">
                                <tr>
                                    <td colspan="5" class="text-center text-muted py-4">
                                        Loading meetings...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div
                        id="paginationControls"
                        class="pagination-controls"
                        style="
                            display: none;
                            justify-content: space-between;
                            align-items: center;
                            margin-top: 1rem;
                            padding: 0.5rem;
                        "
                    >
                        <span id="pageInfo" class="text-muted" style="font-size: 0.85rem"></span>
                        <div style="display: flex; gap: 0.5rem">
                            <button
                                class="btn btn-secondary"
                                id="prevPageBtn"
                                onclick="app.prevPage()"
                                style="padding: 0.3rem 0.6rem; font-size: 0.8rem"
                            >
                                &larr; Prev
                            </button>
                            <button
                                class="btn btn-secondary"
                                id="nextPageBtn"
                                onclick="app.nextPage()"
                                style="padding: 0.3rem 0.6rem; font-size: 0.8rem"
                            >
                                Next &rarr;
                            </button>
                        </div>
                    </div>
                </section>
            </main>
        </div>
        
        <div id="successModal" class="modal-overlay hidden">
            <div class="modal-card">
                <div class="modal-icon">✅</div>
                <h3>Meeting Created!</h3>
                <p id="modalTopic" style="font-weight: 600; margin-bottom: 2rem; color: var(--muted);"></p>
                
                <div class="modal-actions">
                    <a id="modalJoinBtn" href="#" target="_blank" class="btn btn-primary">Join Meeting</a>
                    <button id="copyModalBtn" onclick="app.copyToClipboard()" class="btn btn-secondary">Copy Link</button>
                    <button onclick="app.closeModal()" class="btn btn-secondary" style="border: none; margin-top: 0.5rem; font-size: 0.85rem; opacity: 0.8;">Done</button>
                </div>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
